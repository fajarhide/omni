<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="20%" cy="50%" r="75%" fx="20%" fy="50%">
      <stop offset="0%" stop-color="#3b1563" />
      <stop offset="50%" stop-color="#140f24" />
      <stop offset="100%" stop-color="#0b0814" />
    </radialGradient>
    
    <!-- Icon Gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Icon Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgGlow)" />
  
  <!-- Outer Glow for Icon -->
  <rect x="70" y="70" width="200" height="200" rx="48" fill="url(#iconBg)" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Left Icon Background -->
  <rect x="70" y="70" width="200" height="200" rx="48" fill="url(#iconBg)" />
  
  <!-- Inner Icon: The OMNI Prism (Less Noise. More Signal) -->
  <g transform="translate(170, 170)">
    <!-- The Prism -->
    <polygon points="0,-32 28,22 -28,22" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" />
    
    <!-- Inside the prism: a glowing refraction core -->
    <circle cx="0" cy="5" r="5" fill="#ffffff" filter="url(#glow)" />
    <line x1="-15" y1="5" x2="-5" y2="5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7" />
    
    <!-- Noise (Left Side) - Multiple scattered inputs -->
    <line x1="-50" y1="-15" x2="-20" y2="-15" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <line x1="-60" y1="-5" x2="-24" y2="-5" stroke="#c084fc" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    <line x1="-55" y1="5" x2="-28" y2="5" stroke="#e879f9" stroke-width="3" stroke-linecap="round" />
    <line x1="-45" y1="15" x2="-32" y2="15" stroke="#f472b6" stroke-width="3" stroke-linecap="round" opacity="0.6" />

    <!-- Pure Signal (Right Side) - One thick focused output -->
    <line x1="22" y1="5" x2="60" y2="5" stroke="#22d3ee" stroke-width="7" stroke-linecap="round" filter="url(#glow)" />
  </g>
  
  <!-- Texts -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Top tag -->
    <circle cx="316" cy="101" r="3" fill="#a78bfa" />
    <text x="328" y="105" fill="#a78bfa" font-size="11" font-weight="700" letter-spacing="2">CONTEXT OS • SEMANTIC SIGNAL ENGINE</text>
    
    <!-- Main Title -->
    <text x="312" y="165" fill="#ffffff" font-size="72" font-weight="800" letter-spacing="-2">OMNI</text>
    
    <!-- Description -->
    <text x="316" y="208" fill="#cbd5e1" font-size="18" font-weight="400">Run AI agents with <tspan fill="#ffffff" font-weight="600">zero noise</tspan>. OMNI intercepts, analyzes, and</text>
    <text x="316" y="234" fill="#cbd5e1" font-size="18" font-weight="400">distills terminal outputs. <tspan fill="#ffffff" font-weight="600">Cut your token consumption by up</tspan></text>
    <text x="316" y="260" fill="#ffffff" font-size="18" font-weight="600">to 90% <tspan fill="#cbd5e1" font-weight="400">while preserving every critical diagnostic detail.</tspan></text>
    
    <!-- Badges -->
    <g transform="translate(316, 290)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="165" height="28" rx="14" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1.5" />
      <text x="14" y="19" fill="#e2e8f0" font-size="12" font-weight="600">⚡ 90% Token Savings</text>
      
      <!-- Badge 2 -->
      <rect x="175" y="0" width="130" height="28" rx="14" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1.5" />
      <text x="189" y="19" fill="#e2e8f0" font-size="12" font-weight="600">🦀 Written in Rust</text>
      
      <!-- Badge 3 -->
      <rect x="315" y="0" width="130" height="28" rx="14" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1.5" />
      <text x="329" y="19" fill="#e2e8f0" font-size="12" font-weight="600">✓ MCP Compatible</text>
    </g>
  </g>
</svg>
