<svg xmlns="http://www.w3.org/2000/svg" width="950" height="480" viewBox="0 0 950 480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#19132e" />
      <stop offset="100%" stop-color="#0a0812" />
    </radialGradient>
    
    <linearGradient id="box1Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161c36" />
      <stop offset="100%" stop-color="#0e1124" />
    </linearGradient>

    <linearGradient id="box2Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1854" />
      <stop offset="100%" stop-color="#140b2e" />
    </linearGradient>

    <linearGradient id="box3Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a24" />
      <stop offset="100%" stop-color="#120e14" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="950" height="480" fill="url(#bg)" />

  <!-- TOP TEXT -->
  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="475" y="55" fill="#a78bfa" font-size="12" font-weight="700" letter-spacing="3">HOW IT WORKS</text>
    <text x="475" y="95" fill="#ffffff" font-size="32" font-weight="800">AI Agent → <tspan fill="#c084fc">OMNI Engine</tspan> → Raw Terminal</text>
  </g>

  <!-- BOX 1: AI Agent -->
  <g transform="translate(40, 140)">
    <rect width="250" height="260" rx="16" fill="url(#box1Bg)" stroke="#374151" stroke-width="1.5" />
    
    <!-- Header -->
    <rect x="24" y="24" width="40" height="40" rx="10" fill="#3b82f6" />
    <path d="M 34 36 L 42 44 L 34 52 M 46 52 L 54 52" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="78" y="50" fill="#ffffff" font-size="20" font-weight="600" font-family="-apple-system, sans-serif">AI Agents</text>
    
    <!-- Content -->
    <text x="24" y="95" fill="#94a3b8" font-size="14" font-family="-apple-system, sans-serif">
      <tspan x="24" dy="0">Runs autonomous commands.</tspan>
      <tspan x="24" dy="22">Receives 100% pure signal</tspan>
      <tspan x="24" dy="22">without blowing up expensive</tspan>
      <tspan x="24" dy="22">token budgets.</tspan>
    </text>

    <!-- Pills -->
    <rect x="24" y="190" width="95" height="28" rx="14" fill="#172554" stroke="#1e40af" stroke-width="1" />
    <text x="71.5" y="209" fill="#93c5fd" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">Claude Code</text>

    <rect x="127" y="190" width="70" height="28" rx="14" fill="#172554" stroke="#1e40af" stroke-width="1" />
    <text x="162" y="209" fill="#93c5fd" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">Cursor</text>

    <rect x="24" y="226" width="105" height="28" rx="14" fill="#172554" stroke="#1e40af" stroke-width="1" />
    <text x="76.5" y="245" fill="#93c5fd" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">Continue.dev</text>
  </g>

  <!-- ARROWS 1 -->
  <g transform="translate(300, 220)">
    <!-- Top Arrow: Agent -> Engine -->
    <text x="25" y="-12" fill="#a78bfa" font-size="11" font-family="monospace" font-weight="600" text-anchor="middle">run command</text>
    <line x1="0" y1="0" x2="50" y2="0" stroke="#a78bfa" stroke-width="2.5" />
    <polygon points="50,-5 58,0 50,5" fill="#a78bfa" />

    <!-- Bottom Arrow: Engine -> Agent -->
    <line x1="50" y1="40" x2="0" y2="40" stroke="#0ea5e9" stroke-width="2.5" />
    <polygon points="0,35 -8,40 0,45" fill="#0ea5e9" />
    <text x="25" y="60" fill="#38bdf8" font-size="11" font-family="monospace" font-weight="600" text-anchor="middle">clean signal</text>
    <text x="25" y="76" fill="#38bdf8" font-size="11" font-family="monospace" text-anchor="middle">(400 tokens)</text>
  </g>

  <!-- BOX 2: OMNI Engine -->
  <g transform="translate(370, 140)">
    <!-- Glowing background -->
    <rect width="250" height="260" rx="16" fill="url(#box2Bg)" opacity="0.8" filter="url(#glow)"/>
    <rect width="250" height="260" rx="16" fill="url(#box2Bg)" stroke="#8b5cf6" stroke-width="1.5" />
    
    <!-- Header -->
    <rect x="24" y="24" width="40" height="40" rx="10" fill="#9333ea" />
    <polygon points="44,30 52,48 36,48" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="44" cy="42" r="2.5" fill="#ffffff" />
    
    <text x="78" y="50" fill="#ffffff" font-size="20" font-weight="600" font-family="-apple-system, sans-serif">OMNI Engine</text>
    
    <!-- Content -->
    <text x="24" y="95" fill="#e2e8f0" font-size="14" font-family="-apple-system, sans-serif">
      <tspan x="24" dy="0">Transparently intercepts I/O,</tspan>
      <tspan x="24" dy="22">analyzes streams on the fly,</tspan>
      <tspan x="24" dy="22">and distills massive raw logs</tspan>
      <tspan x="24" dy="22">into high-value context.</tspan>
    </text>

    <!-- Pills -->
    <rect x="24" y="190" width="95" height="28" rx="14" fill="#3b0764" stroke="#7e22ce" stroke-width="1" />
    <text x="71.5" y="209" fill="#d8b4fe" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">TOML Filters</text>

    <rect x="127" y="190" width="100" height="28" rx="14" fill="#3b0764" stroke="#7e22ce" stroke-width="1" />
    <text x="177" y="209" fill="#d8b4fe" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">Data Pipeline</text>

    <rect x="24" y="226" width="115" height="28" rx="14" fill="#3b0764" stroke="#7e22ce" stroke-width="1" />
    <text x="81.5" y="245" fill="#d8b4fe" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">Factual Guards</text>

    <rect x="147" y="226" width="85" height="28" rx="14" fill="#3b0764" stroke="#7e22ce" stroke-width="1" />
    <text x="189.5" y="245" fill="#d8b4fe" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">MCP Server</text>
  </g>

  <!-- ARROWS 2 -->
  <g transform="translate(630, 220)">
    <!-- Top Arrow: Engine -> Terminal -->
    <text x="25" y="-12" fill="#a78bfa" font-size="11" font-family="monospace" font-weight="600" text-anchor="middle">execute</text>
    <line x1="0" y1="0" x2="50" y2="0" stroke="#a78bfa" stroke-width="2.5" />
    <polygon points="50,-5 58,0 50,5" fill="#a78bfa" />

    <!-- Bottom Arrow: Terminal -> Engine -->
    <line x1="50" y1="40" x2="0" y2="40" stroke="#f43f5e" stroke-width="2.5" />
    <polygon points="0,35 -8,40 0,45" fill="#f43f5e" />
    <text x="25" y="60" fill="#fb7185" font-size="11" font-family="monospace" font-weight="600" text-anchor="middle">raw noise</text>
    <text x="25" y="76" fill="#fb7185" font-size="11" font-family="monospace" text-anchor="middle">(25k tokens)</text>
  </g>

  <!-- BOX 3: Terminal / OS -->
  <g transform="translate(700, 140)">
    <rect width="210" height="260" rx="16" fill="url(#box3Bg)" stroke="#3f3f46" stroke-width="1.5" />
    
    <!-- Header -->
    <rect x="24" y="24" width="40" height="40" rx="10" fill="#27272a" stroke="#52525b" />
    <rect x="30" y="32" width="28" height="24" rx="4" fill="none" stroke="#e4e4e7" stroke-width="2" />
    <line x1="34" y1="38" x2="42" y2="38" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round" />
    
    <text x="78" y="50" fill="#ffffff" font-size="20" font-weight="600" font-family="-apple-system, sans-serif">The Shell</text>
    
    <!-- Content -->
    <text x="24" y="95" fill="#94a3b8" font-size="14" font-family="-apple-system, sans-serif">
      <tspan x="24" dy="0">Runs the actual command.</tspan>
      <tspan x="24" dy="22">Outputs massive, noisy logs</tspan>
      <tspan x="24" dy="22">filled with progress bars,</tspan>
      <tspan x="24" dy="22">warnings, and redundancy.</tspan>
    </text>

    <!-- Pills -->
    <rect x="24" y="190" width="85" height="28" rx="14" fill="#4c0519" stroke="#9f1239" stroke-width="1" />
    <text x="66.5" y="209" fill="#fda4af" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">cargo test</text>

    <rect x="117" y="190" width="75" height="28" rx="14" fill="#4c0519" stroke="#9f1239" stroke-width="1" />
    <text x="154.5" y="209" fill="#fda4af" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">git diff</text>

    <rect x="24" y="226" width="95" height="28" rx="14" fill="#4c0519" stroke="#9f1239" stroke-width="1" />
    <text x="71.5" y="245" fill="#fda4af" font-size="12" font-weight="500" font-family="-apple-system, sans-serif" text-anchor="middle">npm install</text>
  </g>

  <!-- Bottom text -->
  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="475" y="440" fill="#94a3b8" font-size="14">
      At the API level, OMNI intercepts your agent's commands before they reach the shell, processing the massive stdout returns
    </text>
    <text x="475" y="465" fill="#94a3b8" font-size="14">
      in real-time and feeding back <tspan fill="#ffffff" font-weight="600">only the exact lines</tspan> the AI needs to solve the problem.
    </text>
  </g>
</svg>
