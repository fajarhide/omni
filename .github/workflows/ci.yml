name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-core:
    name: Zig Core
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check Version Consistency
        run: make check-version

      - name: Build Native Core
        run: |
          cd core
          zig build -Doptimize=ReleaseFast -Dversion=CI-BUILD -p ../
          ../bin/omni --version

      - name: Run Native Tests
        run: |
          cd core
          zig build test

      - name: Run Semantic Verification
        run: make test

  zig-wasm:
    name: Zig WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build WASM
        run: |
          cd core
          zig build wasm -Doptimize=ReleaseSmall -Dversion=CI-BUILD -p ../

  node-gateway:
    name: Node Gateway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Gateway
        run: npm run build
